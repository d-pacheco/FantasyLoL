services:
  riot-app:
    build:
      context: ..
      dockerfile: docker-files/Dockerfile-riot
    ports:
      - "8000:8000"
    volumes:
      - fantasy_sqlitedb:/app/database
      - fantasy_logs:/app/logs

  fantasy-app:
    build:
      context: ..
      dockerfile: docker-files/Dockerfile-fantasy
    ports:
      - "8002:8002"
    volumes:
      - fantasy_sqlitedb:/app/database
      - fantasy_logs:/app/logs

  master-scraper:
    build:
      context: ..
      dockerfile: docker-files/Dockerfile-scraper
    container_name: master_scraper
    ports:
      - "8004:8004"
    volumes:
      - fantasy_sqlitedb:/app/database
      - fantasy_logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MASTER_SCRAPER=true

volumes:
  fantasy_sqlitedb:
  fantasy_logs: